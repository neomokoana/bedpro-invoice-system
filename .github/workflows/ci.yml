name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest

    env:
      # Prisma needs a DATABASE_URL even when not hitting a real DB in tests
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bedpro_test
      NEXTAUTH_SECRET: ci-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
